<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<style>
			body {
				font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
				width: 260px;
				margin: 0;
				padding: 14px;
				color: #111;
			}
			h1 {
				font-size: 14px;
				margin: 0 0 10px;
			}
			.row {
				display: flex;
				align-items: center;
				justify-content: space-between;
				margin: 10px 0;
				font-size: 13px;
			}
			button {
				border: none;
				border-radius: 6px;
				padding: 6px 12px;
				font-size: 13px;
				cursor: pointer;
				background: #16a34a;
				color: #fff;
			}
			button.off {
				background: #f0f0f0;
				color: #333;
			}
			.status {
				font-size: 12px;
				color: #666;
			}
			select {
				font-size: 12px;
				padding: 3px 6px;
				border-radius: 5px;
				border: 1px solid #d4d4d4;
			}
			a {
				font-size: 12px;
				color: #16a34a;
				cursor: pointer;
			}
		</style>
	</head>
	<body>
		<h1>Claudback</h1>
		<div class="row">
			<span>This tab</span>
			<button id="toggle" class="off">Enable</button>
		</div>
		<div class="row">
			<span>Comments here</span>
			<span id="count" class="status">–</span>
		</div>
		<div class="row">
			<span>Status</span>
			<span id="status" class="status">…</span>
		</div>
		<div class="row">
			<span>After Claude reads</span>
			<select id="mode">
				<option value="clear">Clear</option>
				<option value="keep">Keep</option>
			</select>
		</div>
		<div class="row">
			<a id="options">Pairing &amp; options</a>
		</div>
		<script type="module" src="popup.js"></script>
	</body>
</html>
