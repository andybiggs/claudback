<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<style>
			body {
				font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
				width: 260px;
				margin: 0;
				padding: 14px;
				color: #111;
			}
			h1 {
				font-size: 14px;
				margin: 0 0 10px;
			}
			.row {
				display: flex;
				align-items: center;
				justify-content: space-between;
				margin: 10px 0;
				font-size: 13px;
			}
			.status {
				font-size: 13px;
				color: #666;
			}
			.status-synced {
				color: #16a34a;
			}
			.status-pending {
				color: #2563eb;
			}
			.status-offline {
				color: #c0271b;
			}
			.status-unpaired {
				color: #9ca3af;
			}
			.status-wrap {
				display: flex;
				align-items: center;
				gap: 6px;
			}
			.spinner {
				width: 10px;
				height: 10px;
				border: 2px solid #bfdbfe;
				border-top-color: #2563eb;
				border-radius: 50%;
				animation: spin 0.6s linear infinite;
			}
			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}
			.hint {
				font-size: 11px;
				color: #888;
				margin: -6px 0 10px;
			}
			.hint .copy-btn {
				display: block;
				border: none;
				background: none;
				padding: 0;
				margin-top: 4px;
				font-size: 11px;
				color: #16a34a;
				text-decoration: underline;
				cursor: pointer;
			}
			.switch {
				position: relative;
				display: inline-block;
				width: 34px;
				height: 20px;
				flex-shrink: 0;
			}
			.switch input {
				opacity: 0;
				width: 0;
				height: 0;
			}
			.slider {
				position: absolute;
				inset: 0;
				background: #d4d4d4;
				border-radius: 20px;
				cursor: pointer;
				transition: background 0.15s;
			}
			.slider::before {
				content: "";
				position: absolute;
				height: 16px;
				width: 16px;
				left: 2px;
				top: 2px;
				background: #fff;
				border-radius: 50%;
				transition: transform 0.15s;
			}
			.switch input:checked + .slider {
				background: #16a34a;
			}
			.switch input:checked + .slider::before {
				transform: translateX(14px);
			}
			.switch input:disabled + .slider {
				opacity: 0.5;
				cursor: not-allowed;
			}
			button.secondary {
				border: none;
				border-radius: 6px;
				padding: 8px 12px;
				font-size: 13px;
				cursor: pointer;
				background: #f0f0f0;
				color: #16a34a;
				width: 100%;
				margin-top: 4px;
			}
		</style>
	</head>
	<body>
		<h1>Claudback</h1>
		<div class="row">
			<span>Enabled</span>
			<label class="switch">
				<input type="checkbox" id="toggle" />
				<span class="slider"></span>
			</label>
		</div>
		<div class="row">
			<span>Comments</span>
			<span id="count" class="status">–</span>
		</div>
		<div class="row">
			<span>Status</span>
			<span class="status-wrap">
				<span id="status-spinner" class="spinner" hidden></span>
				<span id="status" class="status">–</span>
			</span>
		</div>
		<div id="status-hint" class="hint" hidden>
			<span id="status-hint-text"></span>
			<button id="copy-prompt" class="copy-btn" hidden>Copy prompt for Claude</button>
		</div>
		<button id="options" class="secondary">Pairing &amp; options</button>
		<script type="module" src="popup.js"></script>
	</body>
</html>
